apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 357768534188.dkr.ecr.eu-north-1.amazonaws.com/shopping-site-googlegrocery:b0c4a5147a688c880e25b1217acab9d2e45bd33a
        ports:
        - containerPort: 80
