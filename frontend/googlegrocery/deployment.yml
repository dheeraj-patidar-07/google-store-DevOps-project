apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 357768534188.dkr.ecr.eu-north-1.amazonaws.com/shopping-site-googlegrocery:c231a6ee3fd889c993b7542bc6bc8ac8317e544c
        ports:
        - containerPort: 80
