apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 357768534188.dkr.ecr.eu-north-1.amazonaws.com/shopping-site-googlegrocery:bf9c14d6c42744f298cc412af738173cd956f804
        ports:
        - containerPort: 80
