apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 357768534188.dkr.ecr.eu-north-1.amazonaws.com/shopping-site-googleclothes:c231a6ee3fd889c993b7542bc6bc8ac8317e544c
        ports:
        - containerPort: 80
