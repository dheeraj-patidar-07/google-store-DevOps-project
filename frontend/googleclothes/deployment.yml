apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 357768534188.dkr.ecr.eu-north-1.amazonaws.com/shopping-site-googleclothes:bf9c14d6c42744f298cc412af738173cd956f804
        ports:
        - containerPort: 80
