apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 357768534188.dkr.ecr.eu-north-1.amazonaws.com/shopping-site-main:c58dd8e43227df24ce4df264ca5ed8114749b6e7
        ports:
        - containerPort: 80

