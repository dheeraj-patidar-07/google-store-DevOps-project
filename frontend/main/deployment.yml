apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 357768534188.dkr.ecr.eu-north-1.amazonaws.com/shopping-site-main:b0c4a5147a688c880e25b1217acab9d2e45bd33a
        ports:
        - containerPort: 80

