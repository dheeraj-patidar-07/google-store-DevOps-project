apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 905418310012.dkr.ecr.us-east-1.amazonaws.com/shopping-site-main:5f6b1613b4285406757989d95f5abd940e357105
        ports:
        - containerPort: 80

