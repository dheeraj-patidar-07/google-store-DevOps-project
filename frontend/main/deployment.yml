apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 357768534188.dkr.ecr.eu-north-1.amazonaws.com/shopping-site-main:c231a6ee3fd889c993b7542bc6bc8ac8317e544c
        ports:
        - containerPort: 80

