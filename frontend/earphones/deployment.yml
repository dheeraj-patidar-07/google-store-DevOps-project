  labels:
    app: earphones
spec:
  replicas: 2
  selector:
    matchLabels:
      app: earphones
  template:
    metadata:
      labels:
        app: earphones
    spec:
      containers:
      - name: earphones
        image: 357768534188.dkr.ecr.eu-north-1.amazonaws.com/shopping-site-earphones:5fd3df087165fd6e3644da3a4264dfbe52650896
        ports:
        - containerPort: 80
