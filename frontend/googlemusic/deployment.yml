apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 357768534188.dkr.ecr.eu-north-1.amazonaws.com/shopping-site-googlemusic:c231a6ee3fd889c993b7542bc6bc8ac8317e544c
        ports:
        - containerPort: 80
