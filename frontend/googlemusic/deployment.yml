apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 357768534188.dkr.ecr.eu-north-1.amazonaws.com/shopping-site-googlemusic:b0c4a5147a688c880e25b1217acab9d2e45bd33a
        ports:
        - containerPort: 80
