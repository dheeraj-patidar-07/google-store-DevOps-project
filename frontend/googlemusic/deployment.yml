apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 357768534188.dkr.ecr.eu-north-1.amazonaws.com/shopping-site-googlemusic:cf06d880406f11f1d29e7a8fe3e859fb3748e4f1
        ports:
        - containerPort: 80
