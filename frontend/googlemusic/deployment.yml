apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 357768534188.dkr.ecr.eu-north-1.amazonaws.com/shopping-site-googlemusic:c58dd8e43227df24ce4df264ca5ed8114749b6e7
        ports:
        - containerPort: 80
