  template:
    metadata:
      labels:
        app: phones
    spec:
      containers:
      - name: phones
        image: 357768534188.dkr.ecr.eu-north-1.amazonaws.com/shopping-site-phones:b0c4a5147a688c880e25b1217acab9d2e45bd33a
        ports:
        - containerPort: 80
