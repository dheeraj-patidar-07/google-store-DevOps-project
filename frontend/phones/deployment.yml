      labels:
        app: phones
    spec:
      containers:
      - name: phones
        image: 905418310012.dkr.ecr.us-east-1.amazonaws.com/shopping-site-phones:5f6b1613b4285406757989d95f5abd940e357105
        ports:
        - containerPort: 80
