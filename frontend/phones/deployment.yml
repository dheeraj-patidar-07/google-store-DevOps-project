apiVersion: apps/v1
kind: Deployment
metadata:
  name: phones-deployment
  labels:
    app: phones
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phones
  template:
    metadata:
      labels:
        app: phones
    spec:
      containers:
      - name: phones
        image: 357768534188.dkr.ecr.eu-north-1.amazonaws.com/shopping-site-phones:2b58ec72949f8811d66bad34524d8487cf788c1a
        ports:
        - containerPort: 80
