apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 357768534188.dkr.ecr.eu-north-1.amazonaws.com/shopping-site-googlepay:b0c4a5147a688c880e25b1217acab9d2e45bd33a
        ports:
        - containerPort: 80
