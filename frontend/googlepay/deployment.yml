apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 357768534188.dkr.ecr.eu-north-1.amazonaws.com/shopping-site-googlepay:f17cb8c562f245127af20eda1e59e1c5f942ebba
        ports:
        - containerPort: 80
