apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 357768534188.dkr.ecr.eu-north-1.amazonaws.com/shopping-site-googlepay:c231a6ee3fd889c993b7542bc6bc8ac8317e544c
        ports:
        - containerPort: 80
