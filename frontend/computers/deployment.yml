      labels:
        app: computers
    spec:
      containers:
      - name: computers
        image: 357768534188.dkr.ecr.eu-north-1.amazonaws.com/shopping-site-computers:5fd3df087165fd6e3644da3a4264dfbe52650896
        ports:
        - containerPort: 80
