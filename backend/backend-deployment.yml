apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 357768534188.dkr.ecr.eu-north-1.amazonaws.com/shopping-site-backend:b0c4a5147a688c880e25b1217acab9d2e45bd33a
          ports:
            - containerPort: 5000
