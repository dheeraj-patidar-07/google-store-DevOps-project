apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 357768534188.dkr.ecr.eu-north-1.amazonaws.com/shopping-site-backend:c231a6ee3fd889c993b7542bc6bc8ac8317e544c
          ports:
            - containerPort: 5000
