apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 357768534188.dkr.ecr.eu-north-1.amazonaws.com/shopping-site-backend:cf06d880406f11f1d29e7a8fe3e859fb3748e4f1
          ports:
            - containerPort: 5000
