apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 357768534188.dkr.ecr.eu-north-1.amazonaws.com/shopping-site-backend:c58dd8e43227df24ce4df264ca5ed8114749b6e7
          ports:
            - containerPort: 5000
