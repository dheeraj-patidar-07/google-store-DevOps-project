apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 905418310012.dkr.ecr.us-east-1.amazonaws.com/shopping-site-backend:5f6b1613b4285406757989d95f5abd940e357105
          ports:
            - containerPort: 5000
